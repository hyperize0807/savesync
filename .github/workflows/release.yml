name: Build and Release EXE

# v1.0.0 같은 버전 태그를 push 하면 Windows 러너에서 exe 를 빌드해
# 해당 태그의 GitHub Release 에 SaveSync.exe 를 첨부한다.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # 릴리스 생성 / 에셋 업로드에 필요

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 의존성 설치
        run: python -m pip install -r requirements-dev.txt

      - name: OAuth 클라이언트 주입
        shell: pwsh
        env:
          # Secrets / Variables 어느 쪽에 등록해도 동작하도록 폴백.
          CID: ${{ secrets.SAVESYNC_OAUTH_CLIENT_ID || vars.SAVESYNC_OAUTH_CLIENT_ID }}
          CSECRET: ${{ secrets.SAVESYNC_OAUTH_CLIENT_SECRET || vars.SAVESYNC_OAUTH_CLIENT_SECRET }}
        run: |
          if (-not $env:CID -or -not $env:CSECRET) {
            Write-Error "SAVESYNC_OAUTH_CLIENT_ID / SAVESYNC_OAUTH_CLIENT_SECRET 시크릿이 설정되지 않았습니다. (저장소 Settings → Secrets and variables → Actions)"
            exit 1
          }
          $p = "savesync/oauth_client.py"
          $src = Get-Content $p -Raw
          $src = $src -replace 'CLIENT_ID = ""',     ('CLIENT_ID = "' + $env:CID + '"')
          $src = $src -replace 'CLIENT_SECRET = ""', ('CLIENT_SECRET = "' + $env:CSECRET + '"')
          Set-Content $p $src -Encoding utf8 -NoNewline
          Write-Host "OAuth 클라이언트 주입 완료 (client_id 끝자리: $($env:CID.Substring([Math]::Max(0,$env:CID.Length-12))))"

      - name: exe 빌드
        run: .\build_exe.ps1
        shell: pwsh

      - name: 릴리스에 exe 첨부
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SaveSync.exe
          generate_release_notes: true
