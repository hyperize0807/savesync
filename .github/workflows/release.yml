name: Build and Release EXE

# v1.0.0 같은 버전 태그를 push 하면 Windows 러너에서 exe 를 빌드해
# 해당 태그의 GitHub Release 에 SaveSync.exe 를 첨부한다.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # 릴리스 생성 / 에셋 업로드에 필요

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 의존성 설치
        run: python -m pip install -r requirements-dev.txt

      - name: 버전 태그 검증
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v',''
          $ver = python -c "import re; print(re.search(r'__version__\s*=\s*\""([^\""]+)\""', open('savesync/__init__.py', encoding='utf-8').read()).group(1))"
          if ($tag -ne $ver) {
            Write-Error "푸시된 태그($tag) 와 __version__($ver) 이 일치하지 않습니다. savesync/__init__.py 의 __version__ 을 맞춰주세요."
            exit 1
          }
          Write-Host "버전 일치: $ver"

      - name: OAuth 클라이언트 주입
        shell: pwsh
        env:
          CID: ${{ secrets.SAVESYNC_OAUTH_CLIENT_ID }}
          CSECRET: ${{ secrets.SAVESYNC_OAUTH_CLIENT_SECRET }}
        run: |
          if (-not $env:CID -or -not $env:CSECRET) {
            Write-Error "SAVESYNC_OAUTH_CLIENT_ID / SAVESYNC_OAUTH_CLIENT_SECRET 시크릿이 설정되지 않았습니다. (저장소 Settings → Secrets and variables → Actions)"
            exit 1
          }
          $p = "savesync/oauth_client.py"
          $src = Get-Content $p -Raw
          $src = $src -replace 'CLIENT_ID = ""',     ('CLIENT_ID = "' + $env:CID + '"')
          $src = $src -replace 'CLIENT_SECRET = ""', ('CLIENT_SECRET = "' + $env:CSECRET + '"')
          Set-Content $p $src -Encoding utf8 -NoNewline
          Write-Host "OAuth 클라이언트 주입 완료 (client_id 끝자리: $($env:CID.Substring([Math]::Max(0,$env:CID.Length-12))))"

      - name: exe 빌드
        run: .\build_exe.ps1
        shell: pwsh

      - name: 릴리스 노트 준비
        id: notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $path = "release-notes/$tag.md"
          if (Test-Path $path) {
            Write-Host "릴리스 노트 사용: $path"
          } else {
            # 노트 파일이 없으면 빈 본문 파일을 만들어 둔다(아래 자동 변경로그만 표시됨).
            New-Item -ItemType Directory -Force -Path release-notes | Out-Null
            Set-Content -Path $path -Value "" -Encoding utf8 -NoNewline
            Write-Warning "release-notes/$tag.md 가 없어 본문 없이 진행합니다(자동 변경로그만 포함)."
          }
          "path=$path" >> $env:GITHUB_OUTPUT

      - name: 릴리스에 exe 첨부
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SaveSync.exe
          # release-notes/<tag>.md 본문을 사용하고, 그 아래에 자동 변경로그를 덧붙인다.
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: true
